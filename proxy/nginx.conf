# Single ingress for the explorer. Routes API + WS to backend, /stats-api to the
# stats service, everything else to the rebranded frontend.
#
# Resilient pattern: upstream targets are resolved LAZILY at request time via
# Docker's embedded DNS (127.0.0.11) using variables in proxy_pass. This means
# nginx starts even if an optional service (e.g. stats) is currently stopped —
# only requests to that route fail, instead of nginx refusing to boot.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 20m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Proxy-level health endpoint
    location = /health { return 200 'ok'; add_header Content-Type text/plain; }

    # Backend REST/GraphQL API
    location /api {
        set $up_backend backend:4000;
        proxy_pass http://$up_backend;
    }
    # Realtime WS updates
    location /socket {
        set $up_backend backend:4000;
        proxy_pass http://$up_backend;
    }

    # Stats microservice (charts/analytics) — optional; 502 if stopped locally.
    location /stats-api/ {
        set $up_stats stats:8050;
        rewrite ^/stats-api/(.*) /$1 break;
        proxy_pass http://$up_stats;
    }

    # Rebranded frontend (catch-all)
    location / {
        set $up_frontend frontend:3000;
        proxy_pass http://$up_frontend;
    }
}
