# Single ingress for the explorer. Routes API + WS to backend, everything else
# to the rebranded frontend. TLS is terminated here (or at an upstream ALB).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend  { server backend:4000; }
upstream frontend { server frontend:3000; }
upstream stats    { server stats:8050; }

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Proxy-level health endpoint
    location = /health { return 200 'ok'; add_header Content-Type text/plain; }

    # Backend REST/GraphQL API
    location /api        { proxy_pass http://backend; }
    location /socket     { proxy_pass http://backend; }   # realtime WS updates

    # Stats microservice (charts/analytics)
    location /stats-api  { rewrite ^/stats-api/(.*) /$1 break; proxy_pass http://stats; }

    # Rebranded frontend (catch-all)
    location /           { proxy_pass http://frontend; }
}
