# =============================================================================
# Production blockchain explorer — full stack
# Brand values: config/brand.env | Backend: config/backend.env | Frontend: config/frontend.env
# Pinned image versions live in .env (BACKEND_VERSION, etc.) for reproducible deploys.
# =============================================================================
name: explorer

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  # --------------------------------------------------------------------- DB --
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: blockscout
    volumes:
      - db-data:/var/lib/postgresql/data
    command: postgres -c max_connections=300 -c shared_buffers=512MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [explorer]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [explorer]

  # --------------------------------------------------------------- BACKEND --
  backend:
    image: blockscout/blockscout:${BACKEND_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - config/backend.env
    environment:
      ACCOUNT_REDIS_URL: redis://redis:6379
    # Run migrations, then boot the app. Idempotent on restart.
    command: >
      sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" &&
             bin/blockscout start"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks: [explorer]

  # -------------------------------------------------------------- FRONTEND --
  # Rebranded image built from the materialized fork (frontend/_upstream) using
  # UPSTREAM'S OWN Dockerfile (handles runtime env injection, favicon gen, sprite).
  # Run `make build` first: it injects our overlays/assets/patches into _upstream.
  frontend:
    build:
      context: ./frontend/_upstream
      dockerfile: Dockerfile
      args:
        GIT_TAG: ${FRONTEND_TAG:-v2.8.0}
    image: voltuswave/frontend:${FRONTEND_VERSION:-local}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_started
    env_file:
      - config/frontend.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks: [explorer]

  # ----------------------------------------------------------- STATS / CHARTS
  stats-db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: ${STATS_DB_PASSWORD}
      POSTGRES_DB: stats
    volumes:
      - stats-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d stats"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [explorer]

  stats:
    image: ghcr.io/blockscout/stats:${STATS_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      stats-db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      STATS__DB_URL: postgresql://stats:${STATS_DB_PASSWORD}@stats-db:5432/stats
      STATS__BLOCKSCOUT_DB_URL: postgresql://blockscout:${POSTGRES_PASSWORD}@db:5432/blockscout
      STATS__BLOCKSCOUT_API_URL: http://backend:4000
      STATS__CREATE_DATABASE: "true"
      STATS__RUN_MIGRATIONS: "true"
      STATS__SERVER__HTTP__ENABLED: "true"
      STATS__SERVER__HTTP__ADDR: 0.0.0.0:8050
    networks: [explorer]

  # ------------------------------------------------ SMART CONTRACT VERIFIER --
  smart-contract-verifier:
    image: ghcr.io/blockscout/smart-contract-verifier:${VERIFIER_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      SMART_CONTRACT_VERIFIER__SERVER__HTTP__ADDR: 0.0.0.0:8050
    networks: [explorer]

  visualizer:
    image: ghcr.io/blockscout/visualizer:${VISUALIZER_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    environment:
      VISUALIZER__SERVER__HTTP__ADDR: 0.0.0.0:8050
    networks: [explorer]

  sig-provider:
    image: ghcr.io/blockscout/sig-provider:${SIG_PROVIDER_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    networks: [explorer]

  # ----------------------------------------------------------------- PROXY --
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [explorer]

volumes:
  db-data:
  redis-data:
  stats-db-data:

networks:
  explorer:
    driver: bridge
